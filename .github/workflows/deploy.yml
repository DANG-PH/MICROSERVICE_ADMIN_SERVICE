name: Trigger Deploy

on:
  push:
    branches:
      - master

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger MICROSERVICE_DEPLOY
        run: |
          curl -X POST \
            -H "Authorization: token ${{ secrets.DEPLOY_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/DANG-PH/MICROSERVICE_DEPLOY/dispatches \
            -d '{
              "event_type": "deploy",
              "client_payload": {
                "service": "admin-service",
                "dir": "/root/MICROSERVICE_ADMIN_SERVICE",
                "port": "3006",
                "actor": "${{ github.actor }}",
                "commit": "${{ github.sha }}",
                "message": "${{ github.event.head_commit.message }}"
              }
            }'
